name: Rebuild KVBL app

on:
  workflow_dispatch:        # manual refresh: Actions tab -> Run workflow (works from phone)
  schedule:
    - cron: "0 5,11,17,23 * * *"   # every 6 hours

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        run: python kvbl_app/build.py

      - name: Commit refreshed site
        run: |
          git config user.name "kvbl-bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Refresh data $(date -u +'%Y-%m-%d %H:%M')"
          git push
